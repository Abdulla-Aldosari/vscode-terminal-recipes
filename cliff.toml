# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[remote.github]
owner = "Abdulla-Aldosari"
repo = "vscode-terminal-recipes"

[changelog]
header = """
# Changelog

All notable changes to **Terminal Recipes** are documented here.
Versions follow [Semantic Versioning](https://semver.org/).

---
"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{%- macro print_commit(commit) -%}
  - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
  {% if commit.breaking %}[**breaking**] {% endif %}\
  {{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endmacro -%}

{% if version %}\
  {% if previous.version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]({{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
  {% else %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
  {% endif %}\
{% else %}\
  ## [Unreleased]
{% endif %}\

{% if version == "v1.0.0" or version == "1.0.0" %}
- Initial release
{% else %}\
  {% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim }}
    {% for commit in commits | filter(attribute="scope") | sort(attribute="scope") %}
      {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
      {%- if not commit.scope -%}
        {{ self::print_commit(commit=commit) }}
      {% endif -%}
    {% endfor -%}
  {% endfor -%}
{% endif %}

"""

trim = true
footer = ""
postprocessors = [
  { pattern = "<REPO>", replace = "https://github.com/Abdulla-Aldosari/vscode-terminal-recipes" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))" },
]

commit_parsers = [
  # Breaking changes: matches type(optional-scope)!: regardless of type
  { message = "^[a-z]+(\\([^)]*\\))?!:", group = "<!-- 0 -->⚠️ Important Changes" },
  { message = "^feat",    group = "<!-- 1 -->🚀 What's New" },
  { message = "^fix",     group = "<!-- 2 -->🐛 Bug Fixes" },
  { message = "^perf",    group = "<!-- 3 -->⚡ Performance" },
  # Everything else is internal — hidden from the user-facing changelog
  { message = ".*",       skip = true },
]

# Prevent commits that are breaking from being excluded by commit parsers.
protect_breaking_commits = false

# Exclude commits that are not matched by any commit parser.
filter_commits = false

# Regex to select git tags that represent releases.
tag_pattern = "v[0-9].*"

# Regex to select git tags that do not represent proper releases.
# Takes precedence over `tag_pattern`.
# Changes belonging to these releases will be included in the next release.
skip_tags = "beta|alpha"

# Regex to exclude git tags after applying the tag_pattern.
ignore_tags = "rc|v2.1.0|v2.1.1"

# Order releases topologically instead of chronologically.
topo_order = false

# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "newest"
