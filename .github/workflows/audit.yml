name: Security Audit

on:
  push:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 AM UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
